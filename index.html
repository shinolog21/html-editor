<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HTMLエディタ</title>
<meta name="description" content="Web記事用のHTML/Markdownをタグボタンですばやく編集できるエディタ">
<meta name="theme-color" content="#E8EDF3" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0D141C" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HTMLエディタ">
<script src="./vendor/marked.min.js"></script>
</head>
<body>
<style>
  :root {
    --bg: #E8EDF3;
    --panel: #FFFFFF;
    --panel-press: #EEF3F8;
    --text: #17222E;
    --muted: #67798D;
    --border: #CDD8E3;
    --accent: #0B7285;
    --accent-press: #095E6D;
    --accent-contrast: #FFFFFF;
    --accent-soft: #E1F1F5;
    --shadow: 0 1px 2px rgba(23, 34, 46, 0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0D141C;
      --panel: #151E28;
      --panel-press: #1D2937;
      --text: #E2EAF2;
      --muted: #7E90A3;
      --border: #2A3848;
      --accent: #3BC9DB;
      --accent-press: #66D9E8;
      --accent-contrast: #06222B;
      --accent-soft: #103641;
      --shadow: none;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── ヘッダー ── */
  header {
    flex: none;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .brand {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    padding: 0 4px;
  }
  #filename {
    flex: 1;
    min-width: 130px;
    font-size: 16px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--bg);
    color: var(--text);
    min-height: 44px;
  }
  #filename:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── タブバー ── */
  #tabbar {
    flex: none;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #tabbar::-webkit-scrollbar { display: none; }
  .tab {
    flex: none;
    display: flex;
    align-items: center;
    gap: 2px;
    min-height: 40px;
    padding: 0 4px 0 14px;
    border: 1px solid transparent;
    border-radius: 9px;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: var(--panel);
    border-color: var(--border);
    color: var(--text);
    box-shadow: var(--shadow);
  }
  .tab-name {
    max-width: 9em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .tab-close {
    min-height: 32px;
    min-width: 32px;
    padding: 0;
    border: none;
    background: transparent;
    box-shadow: none;
    color: var(--muted);
    font-size: 16px;
    border-radius: 7px;
  }
  .tab-close:active { background: var(--panel-press); }
  .tab.armed .tab-close {
    background: var(--accent);
    color: var(--accent-contrast);
  }
  #btnAddTab {
    flex: none;
    min-height: 40px;
    min-width: 40px;
    padding: 0;
    font-size: 20px;
    line-height: 1;
    color: var(--accent);
  }

  button {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 9px;
    min-height: 44px;
    padding: 0 14px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    box-shadow: var(--shadow);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    white-space: nowrap;
  }
  button:active { background: var(--panel-press); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-contrast);
  }
  button.active:active { background: var(--accent-press); }
  button.armed {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  @media (prefers-reduced-motion: no-preference) {
    button { transition: background-color 0.12s ease; }
  }

  /* ── タグツールバー ── */
  #toolbar {
    flex: none;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  #toolbar button.tag {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 14.5px;
    padding: 0 13px;
  }
  #toolbar button.tag::before { content: "<"; color: var(--muted); }
  #toolbar button.tag::after { content: ">"; color: var(--muted); }
  #toolbar button.tag.md::before, #toolbar button.tag.md::after { content: none; }
  #toolbar button[hidden] { display: none !important; }
  .selwrap { position: relative; flex: none; }
  .selwrap::after {
    content: "▾";
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--muted);
    font-size: 11px;
  }
  .selwrap select {
    appearance: none;
    -webkit-appearance: none;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--accent);
    border-radius: 9px;
    min-height: 44px;
    padding: 0 26px 0 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    box-shadow: var(--shadow);
  }
  .divider {
    flex: none;
    width: 1px;
    align-self: stretch;
    margin: 4px 3px;
    background: var(--border);
  }

  /* ── 検索・置換バー ── */
  #searchbar {
    flex: none;
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  #app.search #searchbar { display: flex; }
  #searchbar .group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 250px;
  }
  #searchbar input {
    flex: 1;
    min-width: 80px;
    font-size: 16px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--bg);
    color: var(--text);
    min-height: 44px;
  }
  #searchbar input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  #searchbar button { padding: 0 12px; }
  #matchCount {
    flex: none;
    min-width: 3.2em;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── 画像トレイ ── */
  #imgTray {
    flex: none;
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #imgTray::-webkit-scrollbar { display: none; }
  #app.imgtray #imgTray { display: flex; }
  .imx {
    position: relative;
    flex: none;
    width: 64px;
    height: 64px;
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .imx img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .imx .del {
    position: absolute;
    top: 2px;
    right: 2px;
    min-height: 22px;
    min-width: 22px;
    padding: 0;
    border: none;
    border-radius: 6px;
    background: rgba(23, 34, 46, 0.55);
    color: #fff;
    font-size: 12px;
    line-height: 1;
    box-shadow: none;
  }
  .imx .del.armed { background: var(--accent); color: var(--accent-contrast); }
  #imgTrayInfo { flex: none; font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* ── 編集面とプレビュー ── */
  #main { flex: 1; min-height: 0; display: flex; position: relative; }
  #editor {
    flex: 1;
    min-width: 0;
    border: none;
    outline: none;
    resize: none;
    padding: 14px 16px 40vh;
    font: 16px/1.7 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    background: var(--panel);
    color: var(--text);
    caret-color: var(--accent);
    -webkit-text-size-adjust: 100%;
  }
  #editor::selection { background: rgba(14, 165, 197, 0.3); }
  #preview {
    flex: 1;
    min-width: 0;
    border: none;
    display: none;
    background: var(--panel);
  }
  #app.preview #preview { display: block; }
  @media (max-width: 899px) {
    #app.preview #editor { display: none; }
  }
  @media (min-width: 900px) {
    #app.preview #editor { border-right: 1px solid var(--border); }
  }

  /* ── 見出しアウトライン(サイドバー) ── */
  #outline {
    flex: none;
    width: clamp(200px, 30%, 320px);
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px;
  }
  #outline[hidden] { display: none; }
  .ol-item {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .ol-item:active { background: var(--panel-press); }
  .ol-item.active { background: var(--accent-soft); }
  .ol-item .lv {
    flex: none;
    width: 22px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--accent);
  }
  .ol-h2 { font-weight: 600; }
  .ol-h3 { padding-left: 28px; }
  .ol-h4 { padding-left: 46px; font-size: 14px; color: var(--muted); }
  .ol-empty { padding: 16px 12px; color: var(--muted); font-size: 13px; }

  /* ── 公開前チェック ── */
  #lint {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 14px;
    background: rgba(23, 34, 46, 0.25);
  }
  #lint[hidden] { display: none; }
  #lintCard {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: min(560px, 100%);
    max-height: 100%;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 40px rgba(23, 34, 46, 0.2);
  }
  #lintHead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 10px 10px 10px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 15px;
  }
  #lintCount { color: var(--muted); font-weight: 400; font-size: 13px; }
  #btnCloseLint { border: none; box-shadow: none; background: transparent; min-width: 44px; font-size: 18px; }
  #lintBody { overflow-y: auto; padding: 8px; }
  .lint-item {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 44px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 14px;
  }
  .lint-item[data-jump] { cursor: pointer; }
  .lint-item[data-jump]:active { background: var(--panel-press); }
  .lint-badge {
    flex: none;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid currentColor;
  }
  .lint-warn .lint-badge { color: #B45309; }
  .lint-info .lint-badge { color: var(--muted); }
  .lint-ok { padding: 20px 16px; color: var(--accent); font-weight: 600; font-size: 15px; }
  @media (prefers-color-scheme: dark) {
    .lint-warn .lint-badge { color: #F0A954; }
  }

  /* ── ステータスバー ── */
  footer {
    flex: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 7px 16px calc(7px + env(safe-area-inset-bottom));
    background: var(--panel);
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  #note { color: var(--accent); }
</style>

<div id="app">
  <header>
    <span class="brand">&lt;/&gt;</span>
    <input id="filename" value="article.html" autocapitalize="none" autocorrect="off" spellcheck="false" aria-label="ファイル名">
    <div class="actions">
      <button type="button" id="btnOpen">開く</button>
      <button type="button" id="btnSave">保存</button>
      <button type="button" id="btnShare">共有</button>
      <button type="button" id="btnCopy">コピー</button>
      <button type="button" id="btnCopyHtml" hidden>HTMLコピー</button>
      <button type="button" id="btnLint">チェック</button>
      <button type="button" id="btnPreview">プレビュー</button>
    </div>
  </header>

  <div id="tabbar" role="tablist" aria-label="開いているファイル">
    <button type="button" id="btnAddTab" aria-label="新しいタブ">＋</button>
  </div>

  <div id="toolbar" role="toolbar" aria-label="タグ挿入"></div>

  <div id="searchbar">
    <div class="group">
      <input id="searchInput" placeholder="検索" autocapitalize="none" autocorrect="off" spellcheck="false" aria-label="検索">
      <span id="matchCount"></span>
      <button type="button" id="btnCase" aria-pressed="false" title="大文字と小文字を区別">Aa</button>
      <button type="button" id="btnPrev" aria-label="前へ">↑</button>
      <button type="button" id="btnNext" aria-label="次へ">↓</button>
      <button type="button" id="btnCloseSearch" aria-label="検索を閉じる">×</button>
    </div>
    <div class="group">
      <input id="replaceInput" placeholder="置換" autocapitalize="none" autocorrect="off" spellcheck="false" aria-label="置換">
      <button type="button" id="btnReplace">置換</button>
      <button type="button" id="btnReplaceAll">すべて置換</button>
    </div>
  </div>

  <main id="main">
    <div id="outline" role="navigation" aria-label="見出し一覧" hidden>
      <div id="outlineList"></div>
    </div>
    <textarea id="editor" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="HTMLソース" placeholder="ここにHTMLを入力…"></textarea>
    <iframe id="preview" sandbox="allow-same-origin" title="プレビュー"></iframe>

    <div id="lint" hidden>
      <div id="lintCard">
        <div id="lintHead">
          <span>公開前チェック<span id="lintCount"></span></span>
          <button type="button" id="btnCloseLint" aria-label="閉じる">×</button>
        </div>
        <div id="lintBody"></div>
      </div>
    </div>
  </main>

  <div id="imgTray">
    <button type="button" id="btnAddImg">＋写真</button>
    <span id="imgTrayInfo"></span>
  </div>

  <footer>
    <span id="count"></span>
    <span id="note"></span>
  </footer>

  <input type="file" id="fileInput" accept=".html,.htm,.txt,.md" hidden>
  <input type="file" id="imgInput" accept="image/*" multiple hidden>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  //  タグボタン設定 ── ここに行を足せばボタンが増えます
  //    label     : ボタンの表示名（<>は自動で付きます）
  //    before/after : 選択テキストの前後に挿入する文字列
  //    block     : true なら複数行選択時に1行ずつタグで囲む
  //    cursor    : 未選択時のカーソル位置（挿入文字列の先頭から数えた文字数。
  //                省略時は before の直後 = タグの中）
  //    selCursor : 選択テキストを囲んだ後のカーソル位置（省略時は末尾）
  //    list      : 'ul' / 'ol' — 選択した各行を <li> にしてリスト化
  //    sep       : true で区切り線
  // ═══════════════════════════════════════════════════════════
  const TAG_BUTTONS = [
    { label: 'h2', before: '<h2>', after: '</h2>', block: true },
    { label: 'h3', before: '<h3>', after: '</h3>', block: true },
    { label: 'h4', before: '<h4>', after: '</h4>', block: true },
    { label: 'p',  before: '<p>',  after: '</p>',  block: true },
    { sep: true },
    { label: 'strong', before: '<strong>', after: '</strong>' },
    { label: 'em',     before: '<em>',     after: '</em>' },
    { label: 'a',      before: '<a href="">', after: '</a>', cursor: 9, selCursor: 9 },
    { label: 'code',   before: '<code>',   after: '</code>' },
    { label: 'mark',   before: '<mark>',   after: '</mark>' },
    { label: 'span.line', before: '<span class="line">', after: '</span>' },
    { sep: true },
    { label: 'ul', list: 'ul' },
    { label: 'ol', list: 'ol' },
    { label: 'li', before: '<li>', after: '</li>', block: true },
    { label: 'blockquote', before: '<blockquote>', after: '</blockquote>', block: true },
    { sep: true },
    { label: 'img', before: '<img src="', after: '" alt="">' },
    { label: 'br',  before: '<br>', after: '' },
    { label: 'hr',  before: '<hr>', after: '' },
  ];

  // ═══════════════════════════════════════════════════════════
  //  媒体プロファイル ── 修飾タグ(INLINE_TAGS)だけを媒体ごとに絞り込む
  //  見出し・p・リスト等の構造タグはどのプロファイルでも常に表示。
  //  新しい媒体は PROFILES に1行追加(tags: 表示するlabelの配列 / null=全部)
  // ═══════════════════════════════════════════════════════════
  const INLINE_TAGS = ['strong', 'em', 'a', 'code', 'mark', 'span.line'];
  const PROFILES = [
    { id: 'all',      name: '全タグ',   tags: null },
    { id: 'hameefun', name: 'HameeFun', tags: ['span.line'] },
    { id: 'suuta',    name: 'SUUTA',    tags: ['mark', 'strong'] },
  ];

  // ── Markdown用ボタン(ラベルはHTMLモードと共通・挿入内容だけMD記法) ──
  //   prefix: 行頭に付与(複数行対応・再タップで解除)
  //   tailSelect: [a,b] 挿入後、末尾からa文字目〜b文字目を選択(URLプレースホルダ用)
  const MD_BUTTONS = [
    { label: 'h2', prefix: '## ' },
    { label: 'h3', prefix: '### ' },
    { label: 'h4', prefix: '#### ' },
    { sep: true },
    { label: 'strong', before: '**', after: '**' },
    { label: 'em', before: '*', after: '*' },
    { label: 'a', before: '[', after: '](url)', tailSelect: [4, 1] },
    { label: 'code', before: '`', after: '`' },
    { sep: true },
    { label: 'ul', prefix: '- ' },
    { label: 'ol', prefix: '1. ' },
    { label: 'blockquote', prefix: '> ' },
    { sep: true },
    { label: 'img', before: '![', after: '](url)', tailSelect: [4, 1] },
    { label: 'hr', before: '\n---\n', after: '' },
  ];

  // ── 原稿形式(タブごとに記憶) ──
  const FORMATS = [
    { id: 'html', name: 'HTML' },
    { id: 'md', name: 'Markdown' },
  ];

  const $ = id => document.getElementById(id);
  const app = $('app'), editor = $('editor'), previewFrame = $('preview'),
        toolbar = $('toolbar'), filenameInput = $('filename'), fileInput = $('fileInput'),
        countEl = $('count'), noteEl = $('note'), btnPreview = $('btnPreview'),
        btnShare = $('btnShare'), tabbar = $('tabbar'), btnAddTab = $('btnAddTab');

  const KEY = 'ipad-html-editor-v2';
  const KEY_V1 = 'ipad-html-editor-v1';
  const SAMPLE = '<h2>使い方</h2>\n<p>テキストを選択してからタグボタンを押すと、選択範囲がタグで囲まれます。</p>\n<p>何も選択せずに押すと空のタグが挿入され、カーソルがタグの中に置かれます。</p>\n<p>複数行を選択して p や h2 を押すと、1行ずつタグで囲まれます。ul は選択した各行を li にします。</p>\n<p>上のタブで複数のファイルを切り替えられます。＋ボタンで新しいタブを追加できます。</p>';

  // ── テキスト挿入（execCommand が使える間は取り消し履歴が残る）──
  function insert(text, cs, ce) {
    editor.focus();
    const start = editor.selectionStart;
    const collapsed = editor.selectionStart === editor.selectionEnd;
    if (text === '' && collapsed) { editor.setSelectionRange(start + cs, start + ce); return; }
    let ok = false;
    try {
      ok = text === ''
        ? document.execCommand('delete', false)
        : document.execCommand('insertText', false, text);
    } catch (_) {}
    if (!ok) {
      editor.setRangeText(text, editor.selectionStart, editor.selectionEnd, 'end');
      editor.dispatchEvent(new Event('input', { bubbles: true }));
    }
    editor.setSelectionRange(start + cs, start + ce);
  }

  function listText(type, sel) {
    const open = '<' + type + '>\n', close = '\n</' + type + '>';
    if (sel.trim()) {
      const items = sel.split('\n').map(l => l.trim()).filter(Boolean)
        .map(l => '  <li>' + l + '</li>').join('\n');
      const text = open + items + close;
      return { text, cur: text.length };
    }
    const text = open + '  <li></li>' + close;
    return { text, cur: (open + '  <li>').length };
  }

  function applyTag(b) {
    if (b.prefix) { applyPrefix(b); return; }
    const v = editor.value, s = editor.selectionStart, e = editor.selectionEnd;
    const sel = v.slice(s, e);
    let text, cs, ce;
    if (b.list) {
      const r = listText(b.list, sel);
      text = r.text; cs = ce = r.cur;
    } else if (sel) {
      if (b.block && sel.includes('\n')) {
        text = sel.split('\n').map(l => l.trim() ? b.before + l.trim() + b.after : l).join('\n');
        cs = ce = text.length;
      } else {
        text = b.before + sel + b.after;
        if (b.tailSelect) { cs = text.length - b.tailSelect[0]; ce = text.length - b.tailSelect[1]; }
        else cs = ce = b.selCursor != null ? b.selCursor : text.length;
      }
    } else {
      text = b.before + b.after;
      if (b.tailSelect) { cs = text.length - b.tailSelect[0]; ce = text.length - b.tailSelect[1]; }
      else cs = ce = b.cursor != null ? b.cursor : b.before.length;
    }
    insert(text, cs, ce);
  }

  // 行頭プレフィックス型(MDの見出し・リスト等)。全行に付いていれば外す(トグル)
  function applyPrefix(b) {
    const v = editor.value, s = editor.selectionStart, e = editor.selectionEnd;
    const ls = v.lastIndexOf('\n', s - 1) + 1;
    let le = v.indexOf('\n', Math.max(e, s));
    if (le === -1) le = v.length;
    const lines = v.slice(ls, le).split('\n');
    const isOl = b.prefix === '1. ';
    const strip = l => isOl ? l.replace(/^\d+\.\s/, '') : (l.startsWith(b.prefix) ? l.slice(b.prefix.length) : l);
    const allPrefixed = lines.filter(l => l.trim()).every(l => isOl ? /^\d+\.\s/.test(l) : l.startsWith(b.prefix));
    let n = 1;
    const out = lines.map(l => {
      if (!l.trim()) return l;
      const bare = strip(l);
      return allPrefixed ? bare : (isOl ? (n++) + '. ' : b.prefix) + bare;
    }).join('\n');
    editor.focus();
    editor.setSelectionRange(ls, le);
    insert(out, out.length, out.length);
  }

  // ── ツールバー生成 ──
  function mkBtn(t) {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = t;
    return b;
  }
  function divider() {
    const d = document.createElement('div');
    d.className = 'divider';
    return d;
  }
  const undoBtn = mkBtn('↺');
  undoBtn.setAttribute('aria-label', '元に戻す');
  undoBtn.addEventListener('click', () => { editor.focus(); document.execCommand('undo'); });
  const redoBtn = mkBtn('↻');
  redoBtn.setAttribute('aria-label', 'やり直す');
  redoBtn.addEventListener('click', () => { editor.focus(); document.execCommand('redo'); });
  const searchBtn = mkBtn('検索');
  searchBtn.setAttribute('aria-label', '検索と置換');
  searchBtn.addEventListener('click', () => {
    app.classList.contains('search') ? closeSearch() : openSearch();
  });
  const outlineBtn = mkBtn('目次');
  outlineBtn.setAttribute('aria-label', '見出し一覧');
  outlineBtn.addEventListener('click', () => {
    outlineEl.hidden ? openOutline() : closeOutline();
  });
  const formatSel = document.createElement('select');
  formatSel.id = 'formatSel';
  formatSel.setAttribute('aria-label', '原稿の形式(HTML/Markdown)');
  for (const f of FORMATS) {
    const o = document.createElement('option');
    o.value = f.id;
    o.textContent = f.name;
    formatSel.appendChild(o);
  }
  formatSel.addEventListener('change', () => {
    const d = activeDoc();
    if (d) d.format = formatSel.value;
    buildTagButtons();
    updateCount();
    if (!outlineEl.hidden) buildOutline();
    if (app.classList.contains('preview')) updatePreview();
    schedulePersist();
  });
  const fmtWrap = document.createElement('div');
  fmtWrap.className = 'selwrap';
  fmtWrap.appendChild(formatSel);
  const profileSel = document.createElement('select');
  profileSel.id = 'profileSel';
  profileSel.setAttribute('aria-label', '媒体プロファイル(修飾タグの絞り込み)');
  for (const p of PROFILES) {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = p.name;
    profileSel.appendChild(o);
  }
  profileSel.addEventListener('change', () => {
    const d = activeDoc();
    if (d) d.profile = profileSel.value;
    applyProfile(profileSel.value);
    schedulePersist();
  });
  const selWrap = document.createElement('div');
  selWrap.className = 'selwrap';
  selWrap.appendChild(profileSel);
  const tagZone = document.createElement('div');
  tagZone.style.display = 'contents';
  const imgBtn = mkBtn('画像');
  imgBtn.setAttribute('aria-label', '画像トレイの表示切替');
  imgBtn.addEventListener('click', () => {
    const on = app.classList.toggle('imgtray');
    imgBtn.classList.toggle('active', on);
    if (on) renderTray();
  });
  toolbar.append(undoBtn, redoBtn, searchBtn, outlineBtn, imgBtn, fmtWrap, selWrap, divider(), tagZone);

  function currentFormat() { return (activeDoc() && activeDoc().format) || 'html'; }

  // 形式に応じてタグボタン一式を組み直す
  function buildTagButtons() {
    tagZone.textContent = '';
    const md = currentFormat() === 'md';
    const defs = md ? MD_BUTTONS : TAG_BUTTONS;
    for (const b of defs) {
      if (b.sep) { tagZone.append(divider()); continue; }
      const el = mkBtn(b.label);
      el.classList.add('tag');
      if (md) el.classList.add('md');
      el.addEventListener('click', () => applyTag(b));
      tagZone.append(el);
    }
    if (formatSel.value !== (md ? 'md' : 'html')) formatSel.value = md ? 'md' : 'html';
    $('btnCopyHtml').hidden = !md;
    applyProfile((activeDoc() && activeDoc().profile) || 'all');
  }
  // ボタンタップでキーボードが閉じないよう、フォーカス移動を止める(selectは除外)
  toolbar.addEventListener('mousedown', e => { if (!e.target.closest('select')) e.preventDefault(); });

  // プロファイルに応じて修飾タグボタンを絞り込む
  function applyProfile(pid) {
    const p = PROFILES.find(x => x.id === pid) || PROFILES[0];
    toolbar.querySelectorAll('button.tag').forEach(btn => {
      if (!INLINE_TAGS.includes(btn.textContent)) return;
      btn.hidden = !!(p.tags && !p.tags.includes(btn.textContent));
    });
    if (profileSel.value !== p.id) profileSel.value = p.id;
  }

  // ── プレビュー ──
  const PREVIEW_CSS = [
    ':root{color-scheme:light dark}',
    'body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.9;max-width:720px;margin:0 auto;padding:28px 20px 120px;color:#17222E;background:#fff}',
    'h2{font-size:1.4em;line-height:1.5;margin:2em 0 .8em;padding-bottom:.35em;border-bottom:2px solid #CDD8E3}',
    'h3{font-size:1.2em;line-height:1.5;margin:1.6em 0 .6em}',
    'h4{font-size:1.05em;margin:1.4em 0 .5em}',
    'p{margin:1em 0}',
    'img{max-width:100%;height:auto;border-radius:6px}',
    'blockquote{margin:1.2em 0;padding:.6em 1.1em;border-left:4px solid #CDD8E3;color:#5C6B7C;background:rgba(23,34,46,.04)}',
    'code{font-family:ui-monospace,Menlo,monospace;font-size:.88em;background:rgba(23,34,46,.07);padding:.15em .4em;border-radius:4px}',
    'mark{background:#FFE289;color:#17222E;padding:.05em .25em;border-radius:3px}',
    'span.line{background:linear-gradient(transparent 62%,#FFE289 62%)}',
    'a{color:#0B7285}',
    'ul,ol{padding-left:1.6em}',
    'li{margin:.3em 0}',
    'hr{border:none;border-top:1px solid #CDD8E3;margin:2em 0}',
    'figure.ph{margin:1.2em 0;padding:10px;border:2px dashed #7FB5C6;border-radius:10px;background:rgba(11,114,133,.04);text-align:center}',
    'figure.ph img{max-width:100%;max-height:320px;border-radius:6px}',
    'figure.ph figcaption{font-size:12px;color:#4A6B78;margin-top:6px}',
    '.ph-missing{padding:24px 8px;color:#8A96A3;font-size:13px}',
    '@media(prefers-color-scheme:dark){figure.ph{border-color:#2E5866;background:rgba(59,201,219,.06)}figure.ph figcaption{color:#7FB0BE}}',
    '@media(prefers-color-scheme:dark){body{color:#E2EAF2;background:#0D141C}h2,hr{border-color:#2A3848}blockquote{border-color:#2A3848;color:#8296AB;background:rgba(255,255,255,.04)}code{background:rgba(255,255,255,.1)}a{color:#4DD4E8}}'
  ].join('');

  // srcdocの再代入はiOS Safariで白画面になる既知の癖があるため、
  // Blob URLへの通常ナビゲーションとして更新する(スクロール位置も引き継ぐ)
  const escHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  let previewUrl = null;
  function updatePreview() {
    const c = editor.value;
    const WRAP_OPEN = '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>' + PREVIEW_CSS + '</style></head><body>';
    let html;
    if (currentFormat() === 'md') {
      let body = null;
      if (window.marked) {
        try { body = marked.parse(c, { gfm: true, breaks: true }); } catch (_) {}
      }
      if (body === null) body = '<p>(MDプレビューには marked.js の読み込みが必要です)</p><pre>' + escHtml(c) + '</pre>';
      html = WRAP_OPEN + resolvePlaceholders(body) + '</body></html>';
    } else {
      html = /<!doctype|<html[\s>]/i.test(c) ? resolvePlaceholders(c) : WRAP_OPEN + resolvePlaceholders(c) + '</body></html>';
    }
    let scrollY = 0;
    try { scrollY = previewFrame.contentWindow.scrollY || 0; } catch (_) {}
    const old = previewUrl;
    previewUrl = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
    previewFrame.onload = () => {
      try { previewFrame.contentWindow.scrollTo(0, scrollY); } catch (_) {}
    };
    previewFrame.src = previewUrl;
    if (old) URL.revokeObjectURL(old);
  }
  btnPreview.addEventListener('click', () => {
    const on = app.classList.toggle('preview');
    btnPreview.textContent = on ? '閉じる' : 'プレビュー';
    btnPreview.classList.toggle('active', on);
    if (on) updatePreview();
  });

  // ── タブ管理 ──
  let docs = [];       // { id, name, content, sel, scroll }
  let activeId = null;
  let uid = 1;
  let armedTabId = null, armedTabTimer = 0;

  function activeDoc() { return docs.find(d => d.id === activeId); }

  function saveActive() {
    const d = activeDoc();
    if (!d) return;
    d.content = editor.value;
    d.name = filenameInput.value;
    d.sel = [editor.selectionStart, editor.selectionEnd];
    d.scroll = editor.scrollTop;
  }

  function renderTabs() {
    tabbar.querySelectorAll('.tab').forEach(el => el.remove());
    for (const d of docs) {
      const tab = document.createElement('div');
      tab.className = 'tab' + (d.id === activeId ? ' active' : '') + (d.id === armedTabId ? ' armed' : '');
      tab.setAttribute('role', 'tab');
      tab.setAttribute('aria-selected', String(d.id === activeId));
      tab.tabIndex = 0;
      const nm = document.createElement('span');
      nm.className = 'tab-name';
      nm.textContent = d.name;
      const cl = document.createElement('button');
      cl.type = 'button';
      cl.className = 'tab-close';
      cl.setAttribute('aria-label', d.name + ' を閉じる');
      cl.textContent = '×';
      cl.addEventListener('click', e => { e.stopPropagation(); requestClose(d.id); });
      tab.append(nm, cl);
      tab.addEventListener('click', () => switchTo(d.id));
      tab.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); switchTo(d.id); }
      });
      tabbar.insertBefore(tab, btnAddTab);
    }
  }

  function switchTo(id) {
    if (id === activeId) return;
    saveActive();
    activeId = id;
    const d = activeDoc();
    if (!d) return;
    editor.value = d.content;
    filenameInput.value = d.name;
    const sel = d.sel || [0, 0];
    editor.setSelectionRange(sel[0], sel[1]);
    editor.scrollTop = d.scroll || 0;
    updateCount();
    buildTagButtons();
    if (app.classList.contains('preview')) updatePreview();
    if (app.classList.contains('search')) updateMatchCount();
    if (!outlineEl.hidden) buildOutline();
    renderTabs();
    schedulePersist();
  }

  function addDoc(name, content, activate, profile, format) {
    const d = { id: uid++, name, content, sel: [0, 0], scroll: 0, profile: profile || 'all', format: format || 'html' };
    docs.push(d);
    if (activate === false) renderTabs();
    else switchTo(d.id);
    return d;
  }

  function uniqueName(base) {
    const m = base.match(/^(.*?)(\.[^.]+)?$/);
    const stem = m[1], ext = m[2] || '';
    let n = base, i = 2;
    while (docs.some(d => d.name === n)) n = stem + '-' + (i++) + ext;
    return n;
  }

  function requestClose(id) {
    const d = docs.find(x => x.id === id);
    if (!d) return;
    const content = id === activeId ? editor.value : d.content;
    if (content.trim() && armedTabId !== id) {
      armedTabId = id;
      clearTimeout(armedTabTimer);
      armedTabTimer = setTimeout(() => { armedTabId = null; renderTabs(); }, 2500);
      renderTabs();
      flash('もう一度タップでタブを閉じます');
      return;
    }
    clearTimeout(armedTabTimer);
    armedTabId = null;
    closeDoc(id);
  }

  function closeDoc(id) {
    const idx = docs.findIndex(x => x.id === id);
    if (idx === -1) return;
    docs.splice(idx, 1);
    if (id === activeId) {
      activeId = null;
      if (docs.length) switchTo(docs[Math.min(idx, docs.length - 1)].id);
      else addDoc('article.html', '');
    } else {
      renderTabs();
      schedulePersist();
    }
  }

  btnAddTab.addEventListener('click', () => addDoc(uniqueName('article.html'), ''));
  // タブ操作でエディタのキーボードが閉じないようにフォーカス移動を止める
  tabbar.addEventListener('mousedown', e => e.preventDefault());

  // ── 自動保存と文字数 ──
  let saveT, prevT, outlineT;
  function schedulePersist() { clearTimeout(saveT); saveT = setTimeout(persist, 600); }
  editor.addEventListener('input', () => {
    const d = activeDoc();
    if (d) d.content = editor.value;
    updateCount();
    schedulePersist();
    if (app.classList.contains('preview')) {
      clearTimeout(prevT); prevT = setTimeout(updatePreview, 300);
    }
    if (app.classList.contains('search')) updateMatchCount();
    if (!outlineEl.hidden) { clearTimeout(outlineT); outlineT = setTimeout(buildOutline, 400); }
  });
  filenameInput.addEventListener('input', () => {
    const d = activeDoc();
    if (d) {
      d.name = filenameInput.value;
      const t = tabbar.querySelector('.tab.active .tab-name');
      if (t) t.textContent = d.name;
    }
    schedulePersist();
  });

  function updateCount() {
    const v = editor.value;
    const body = currentFormat() === 'md'
      ? v.replace(/<!--[\s\S]*?-->/g, '').replace(/^#{1,6}[ \t]+/gm, '').replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1').replace(/\[([^\]]*)\]\([^)]*\)/g, '$1').replace(/^[-+*][ \t]+|^\d+\.[ \t]+|^>[ \t]?/gm, '').replace(/[*_`]/g, '').replace(/\n/g, '')
      : v.replace(/<[^>]*>/g, '').replace(/\n/g, '');
    let s = '本文 ' + body.length.toLocaleString('ja-JP') + '字 / 全体 ' + v.length.toLocaleString('ja-JP') + '字';
    const selLen = editor.selectionEnd - editor.selectionStart;
    if (selLen > 0) s = '選択 ' + selLen.toLocaleString('ja-JP') + '字 ・ ' + s;
    countEl.textContent = s;
    if (!outlineEl.hidden) markActiveOutline();
  }
  // 選択範囲の文字数をリアルタイムに反映
  ['select', 'keyup', 'mouseup', 'touchend'].forEach(ev => editor.addEventListener(ev, updateCount));
  function persist() {
    try {
      saveActive();
      localStorage.setItem(KEY, JSON.stringify({
        v: 2,
        active: docs.findIndex(d => d.id === activeId),
        docs: docs.map(d => ({ name: d.name, content: d.content, profile: d.profile || 'all', format: d.format || 'html' }))
      }));
      flash('自動保存しました');
    } catch (_) {}
  }
  function flash(msg) {
    noteEl.textContent = msg;
    clearTimeout(flash.t);
    flash.t = setTimeout(() => { noteEl.textContent = ''; }, 2500);
  }

  // ── ファイル操作 ──
  $('btnOpen').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    const f = fileInput.files[0];
    if (!f) return;
    const text = await f.text();
    const fmt = /\.(md|markdown)$/i.test(f.name) ? 'md' : 'html';
    const cur = activeDoc();
    if (cur && !editor.value.trim()) {
      // 空のタブならそのタブに開く
      editor.value = text;
      filenameInput.value = f.name;
      cur.content = text;
      cur.name = f.name;
      cur.format = fmt;
      buildTagButtons();
      updateCount();
      if (app.classList.contains('preview')) updatePreview();
      renderTabs();
      persist();
    } else {
      // 編集中のタブがあれば新しいタブに開く
      addDoc(f.name, text, undefined, 'all', fmt);
    }
    fileInput.value = '';
    flash('「' + f.name + '」を開きました');
  });

  function getName() {
    const ext = currentFormat() === 'md' ? '.md' : '.html';
    let n = (filenameInput.value || '').trim() || ('article' + ext);
    if (!/\.[A-Za-z0-9]+$/.test(n)) n += ext;
    return n;
  }
  $('btnSave').addEventListener('click', () => {
    const blob = new Blob([editor.value], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = getName();
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 3000);
    flash('ダウンロードしました');
  });

  // 全文コピー（CMS等への貼り付け用）。画像メモ(<!-- img:.. -->)は自動除去
  function stripPlaceholders(s) {
    return s.replace(/[ \t]*<!--\s*img:[\s\S]*?-->\n?/g, '');
  }
  async function copyText(t) {
    try { await navigator.clipboard.writeText(t); return true; } catch (_) {}
    const ta = document.createElement('textarea');
    ta.value = t;
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (_) {}
    ta.remove();
    return ok;
  }
  $('btnCopy').addEventListener('click', async () => {
    const raw = editor.value;
    const t = stripPlaceholders(raw);
    const done = await copyText(t);
    flash(done ? (t !== raw ? '全文をコピーしました(画像メモは除去)' : '全文をコピーしました') : 'コピーできませんでした');
  });

  // MDモード: HTMLに変換してコピー(CMS貼り付け用)
  $('btnCopyHtml').addEventListener('click', async () => {
    if (!window.marked) { flash('変換ライブラリ(marked)が読み込まれていません'); return; }
    let html;
    try { html = marked.parse(stripPlaceholders(editor.value), { gfm: true, breaks: true }).trim(); }
    catch (_) { flash('変換に失敗しました'); return; }
    const done = await copyText(html);
    flash(done ? 'HTMLに変換してコピーしました' : 'コピーできませんでした');
  });

  // 共有（iPadの共有シート → ファイルに保存 / AirDrop）
  let canShareFiles = false;
  try {
    canShareFiles = !!(navigator.canShare && navigator.canShare({ files: [new File([''], 'a.html', { type: 'text/html' })] }));
  } catch (_) {}
  if (!canShareFiles) btnShare.hidden = true;
  btnShare.addEventListener('click', async () => {
    const f = new File([editor.value], getName(), { type: 'text/html' });
    try { await navigator.share({ files: [f] }); } catch (_) {}
  });

  // ── 検索・置換 ──
  const searchInput = $('searchInput'), replaceInput = $('replaceInput'),
        matchCountEl = $('matchCount'), btnCase = $('btnCase');
  let caseSensitive = false;
  let mirror = null;

  function norm(s) { return caseSensitive ? s : s.toLowerCase(); }

  function allMatches() {
    const q = searchInput.value;
    if (!q) return [];
    const hay = norm(editor.value), needle = norm(q);
    const out = [];
    let i = 0;
    while ((i = hay.indexOf(needle, i)) !== -1) { out.push(i); i += needle.length; }
    return out;
  }

  function updateMatchCount(current) {
    if (!searchInput.value) { matchCountEl.textContent = ''; return; }
    const m = allMatches();
    matchCountEl.textContent = current != null && m.length
      ? (current + 1) + '/' + m.length
      : m.length + '件';
  }

  // テキストエリア内の指定位置が見えるようスクロール（同じ組版のミラー要素で高さを測る）
  function scrollToPos(pos) {
    if (!mirror) {
      mirror = document.createElement('div');
      document.body.appendChild(mirror);
    }
    const cs = getComputedStyle(editor);
    mirror.style.cssText = 'position:absolute;visibility:hidden;left:-9999px;top:0;box-sizing:border-box;'
      + 'white-space:pre-wrap;overflow-wrap:break-word;'
      + 'width:' + editor.clientWidth + 'px;'
      + 'padding:' + cs.paddingTop + ' ' + cs.paddingRight + ' 0 ' + cs.paddingLeft + ';'
      + 'font-family:' + cs.fontFamily + ';font-size:' + cs.fontSize + ';line-height:' + cs.lineHeight + ';';
    mirror.textContent = editor.value.slice(0, pos);
    const marker = document.createElement('span');
    marker.textContent = '​';
    mirror.appendChild(marker);
    editor.scrollTop = Math.max(0, marker.offsetTop - editor.clientHeight * 0.3);
    mirror.textContent = '';
  }

  function gotoMatch(dir) {
    const q = searchInput.value;
    const m = allMatches();
    if (!q || !m.length) { updateMatchCount(); return false; }
    let idx;
    if (dir > 0) {
      idx = m.findIndex(i => i >= editor.selectionEnd);
      if (idx === -1) idx = 0;
    } else {
      const before = m.filter(i => i < editor.selectionStart);
      idx = before.length ? m.indexOf(before[before.length - 1]) : m.length - 1;
    }
    const pos = m[idx];
    editor.setSelectionRange(pos, pos + q.length);
    scrollToPos(pos);
    editor.focus();
    updateMatchCount(idx);
    return true;
  }

  function openSearch() {
    const sel = editor.value.slice(editor.selectionStart, editor.selectionEnd);
    if (sel && sel.length <= 100 && !sel.includes('\n')) searchInput.value = sel;
    app.classList.add('search');
    searchBtn.classList.add('active');
    updateMatchCount();
    searchInput.focus();
    searchInput.select();
  }
  function closeSearch() {
    app.classList.remove('search');
    searchBtn.classList.remove('active');
    editor.focus();
  }

  function doReplace() {
    const q = searchInput.value;
    if (!q) return;
    const sel = editor.value.slice(editor.selectionStart, editor.selectionEnd);
    if (sel.length === q.length && norm(sel) === norm(q)) {
      const r = replaceInput.value;
      insert(r, r.length, r.length);
    }
    gotoMatch(1);
  }

  function doReplaceAll() {
    const q = searchInput.value;
    if (!q) return;
    const m = allMatches();
    if (!m.length) { flash('見つかりませんでした'); return; }
    const r = replaceInput.value, v = editor.value;
    let out = '', last = 0;
    for (const i of m) { out += v.slice(last, i) + r; last = i + q.length; }
    out += v.slice(last);
    const st = editor.scrollTop;
    editor.focus();
    editor.setSelectionRange(0, v.length);
    insert(out, 0, 0);
    editor.scrollTop = st;
    updateMatchCount();
    flash(m.length + '件置換しました');
  }

  searchInput.addEventListener('input', () => updateMatchCount());
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); gotoMatch(e.shiftKey ? -1 : 1); }
  });
  replaceInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doReplace(); }
  });
  btnCase.addEventListener('click', () => {
    caseSensitive = !caseSensitive;
    btnCase.classList.toggle('active', caseSensitive);
    btnCase.setAttribute('aria-pressed', String(caseSensitive));
    updateMatchCount();
  });
  $('btnPrev').addEventListener('click', () => gotoMatch(-1));
  $('btnNext').addEventListener('click', () => gotoMatch(1));
  $('btnCloseSearch').addEventListener('click', closeSearch);
  $('btnReplace').addEventListener('click', doReplace);
  $('btnReplaceAll').addEventListener('click', doReplaceAll);
  // 次へ／置換を連打してもエディタ内の選択が見えたままになるよう、フォーカス移動を止める
  $('searchbar').addEventListener('mousedown', e => { if (e.target.closest('button')) e.preventDefault(); });

  // ── 見出しアウトライン ──
  const outlineEl = $('outline'), outlineList = $('outlineList');

  function jumpTo(start, end) {
    // プレビュー全画面表示中ならエディタに戻してからジャンプ
    if (getComputedStyle(editor).display === 'none') btnPreview.click();
    editor.setSelectionRange(start, end);
    scrollToPos(start);
    editor.focus();
  }

  let outlinePositions = [];

  function buildOutline() {
    outlineList.textContent = '';
    outlinePositions = [];
    const v = editor.value;
    const entries = [];
    if (currentFormat() === 'md') {
      const re = /^(#{2,4})[ \t]+(.+)$/gm;
      let m;
      while ((m = re.exec(v)) !== null) entries.push({ lv: 'h' + m[1].length, text: m[2].trim(), pos: m.index });
    } else {
      const re = /<(h[2-4])\b[^>]*>([\s\S]*?)<\/\1>/gi;
      let m;
      while ((m = re.exec(v)) !== null) entries.push({ lv: m[1].toLowerCase(), text: m[2].replace(/<[^>]*>/g, '').trim(), pos: m.index });
    }
    for (const en of entries) {
      const item = document.createElement('div');
      item.className = 'ol-item ol-' + en.lv;
      const tag = document.createElement('span');
      tag.className = 'lv';
      tag.textContent = en.lv;
      const label = document.createElement('span');
      label.textContent = en.text || '(空の見出し)';
      item.append(tag, label);
      const pos = en.pos;
      outlinePositions.push(pos);
      // ジャンプしても目次は開いたまま(もう一度「目次」ボタンで閉じる)
      item.addEventListener('click', () => { jumpTo(pos, pos); markActiveOutline(); });
      outlineList.appendChild(item);
    }
    if (!entries.length) {
      const e = document.createElement('div');
      e.className = 'ol-empty';
      e.textContent = currentFormat() === 'md' ? '「## 見出し」が見つかりません' : 'h2〜h4 の見出しが見つかりません';
      outlineList.appendChild(e);
    }
    markActiveOutline();
  }

  // カーソル位置が属するセクションの見出しをハイライト
  function markActiveOutline() {
    const cur = editor.selectionStart;
    let active = -1;
    for (let i = 0; i < outlinePositions.length; i++) {
      if (outlinePositions[i] <= cur) active = i; else break;
    }
    outlineList.querySelectorAll('.ol-item').forEach((el, i) => el.classList.toggle('active', i === active));
  }

  function openOutline() { buildOutline(); outlineEl.hidden = false; outlineBtn.classList.add('active'); }
  function closeOutline() { outlineEl.hidden = true; outlineBtn.classList.remove('active'); }
  // 目次タップでエディタのキーボードが閉じないようにフォーカス移動を止める
  outlineEl.addEventListener('mousedown', e => e.preventDefault());

  // ── 公開前チェック ──
  const lintEl = $('lint'), lintBody = $('lintBody'), lintCountEl = $('lintCount');
  const VOID_TAGS = new Set(['area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input', 'link', 'meta', 'param', 'source', 'track', 'wbr']);

  // ═══ 文章・表記ルール辞書 ═══
  // profiles を指定すると該当プロファイル選択時のみ発動(省略=常時)。
  // TEXT_RULES はタグを除いた本文テキストに、HTML_RULES はソース全体に適用。

    { re: /[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}⭐❤]/gu, msg: '[SUUTA] 絵文字は使用不可', level: 'warn', profiles: ['suuta'] },
    // 文体(両媒体とも「です・ます」統一)
    { re: /(だった|であった|である|だ)。/g, msg: '文末は「です・ます」調に(会話文・引用はOK)', level: 'warn', profiles: ['suuta', 'hameefun'] },
  ];

  const HTML_RULES = [
    { re: /<(strong|b)\b/gi, msg: '[HameeFun] <strong>は禁止(強調はspan.lineのみ)', level: 'warn', profiles: ['hameefun'] },
    { re: /<(em|i|u)\b[^>]*>/gi, msg: '装飾タグ(斜体・下線)は使用不可', level: 'warn', profiles: ['suuta', 'hameefun'] },
    { re: /<h[56]\b/gi, msg: '[HameeFun] 見出しはh2〜h4のみ(h5以下不可)', level: 'warn', profiles: ['hameefun'] },
    { re: /<h[456]\b/gi, msg: '[SUUTA] 見出しはH2・H3のみ(H4以下不可)', level: 'warn', profiles: ['suuta'] },
    { re: /<h[234](?![^>]*headline_marker)[^>]*>/gi, msg: '[HameeFun] 見出しに class="headline_marker" が必要', level: 'warn', profiles: ['hameefun'] },
    { re: /<h[1-6][^>]*\bid\s*=/gi, msg: '[HameeFun] 見出しにid属性は付与しない', level: 'warn', profiles: ['hameefun'] },
    { re: /href\s*=\s*["']#/gi, msg: '[HameeFun] ページ内リンク(href="#〜")は禁止', level: 'warn', profiles: ['hameefun'] },
    { re: /<span[^>]*style\s*=\s*["'][^"']*font-weight/gi, msg: 'コピペ由来の不要タグ(<span style="font-weight:…">)の可能性', level: 'info' },
    { re: /style\s*=\s*["'][^"']*(?:color|background|border|font-)/gi, msg: '独自装飾(色・枠線・フォント指定)は禁止', level: 'warn', profiles: ['suuta', 'hameefun'] },
    { re: /<a\b(?=[^>]*(?:valuecommerce|accesstrade|trafficgate|link-ag))(?![^>]*nofollow)[^>]*>/gi, msg: '[HameeFun] アフィリエイトリンクに rel="nofollow" がありません', level: 'warn', profiles: ['hameefun'] },
    { re: /<a\b(?=[^>]*target\s*=\s*["']?_blank)(?![^>]*aria-describedby)[^>]*>/gi, msg: '[HameeFun] 外部リンクに aria-describedby="a11y-new-window-message" を付与', level: 'info', profiles: ['hameefun'] },
  ];

  // タグ(MDでは記法マーカー)を除いた本文テキストと、テキスト位置→ソース位置の対応表
  function buildTextView(v, fmt) {
    const chars = [], map = [];
    const re = fmt === 'md'
      ? /<!--[\s\S]*?-->|\]\([^)\n]*\)|^#{1,6}[ \t]+|^>[ \t]?|^[-+*][ \t]+|^\d+\.[ \t]+|\*\*|[*_`]/gm
      : /<!--[\s\S]*?-->|<[^>]*>/g;
    let last = 0, m;
    while ((m = re.exec(v)) !== null) {
      for (let i = last; i < m.index; i++) { chars.push(v[i]); map.push(i); }
      last = m.index + m[0].length;
    }
    for (let i = last; i < v.length; i++) { chars.push(v[i]); map.push(i); }
    return { text: chars.join(''), map };
  }

  function runLint() {
    const v = editor.value;
    const pid = (activeDoc() && activeDoc().profile) || 'all';
    const fmt = currentFormat();
    const out = [];
    const push = (level, msg, start, end) => { if (out.length < 300) out.push({ level, msg, start, end }); };

    const headings = [];
    let m;
    if (fmt === 'md') {
      // MD: 見出しの収集のみ(タグ構造チェックは対象外)
      const mh = /^(#{1,6})[ \t]+.+$/gm;
      while ((m = mh.exec(v)) !== null) headings.push({ lv: m[1].length, start: m.index, end: m.index + m[0].length });
    } else {
    // ── HTML構造チェック(タグ走査・コメントはスキップ) ──
    const tagRe = /<!--[\s\S]*?-->|<\/?([a-zA-Z][a-zA-Z0-9]*)\b([^>]*)>/g;
    const stack = [];
    while ((m = tagRe.exec(v)) !== null) {
      if (m[0].startsWith('<!--')) continue;
      const raw = m[0], tag = m[1].toLowerCase(), attrs = m[2] || '';
      const isClose = raw[1] === '/';
      const start = m.index, end = m.index + raw.length;
      if (!isClose) {
        if (tag === 'img') {
          if (!/\balt\s*=/i.test(attrs)) push('warn', '<img> に alt がありません', start, end);
          else if (/\balt\s*=\s*(""|'')/.test(attrs)) push('info', '<img> の alt が空です（装飾画像なら問題なし）', start, end);
          if (!/\bsrc\s*=/i.test(attrs) || /\bsrc\s*=\s*(""|'')/.test(attrs)) push('warn', '<img> の src が空です', start, end);
        }
        if (tag === 'a') {
          if (/\bhref\s*=\s*(""|'')/.test(attrs)) push('warn', '<a> の href が空です', start, end);
          if (/\btarget\s*=\s*["']?_blank/i.test(attrs) && !/\brel\s*=\s*["'][^"']*(noopener|noreferrer)/i.test(attrs)) {
            push('warn', 'target="_blank" に rel="noopener" がありません', start, end);
          }
        }
        if (/^h[1-6]$/.test(tag)) headings.push({ lv: +tag[1], start, end });
        if (VOID_TAGS.has(tag) || /\/\s*>$/.test(raw)) continue;
        stack.push({ tag, start, end });
      } else {
        if (VOID_TAGS.has(tag)) { push('warn', '</' + tag + '> は不要です（閉じタグを持たない要素）', start, end); continue; }
        const top = stack[stack.length - 1];
        if (top && top.tag === tag) { stack.pop(); continue; }
        const idx = stack.map(s => s.tag).lastIndexOf(tag);
        if (idx === -1) {
          push('warn', '対応する開始タグのない </' + tag + '> があります', start, end);
        } else {
          for (let i = stack.length - 1; i > idx; i--) {
            push('warn', '<' + stack[i].tag + '> が閉じられていません', stack[i].start, stack[i].end);
          }
          stack.length = idx;
        }
      }
    }
    for (const s of stack) push('warn', '<' + s.tag + '> が閉じられていません', s.start, s.end);
    }

    // 見出し階層
    let prev = null;
    for (const h of headings) {
      if (h.lv === 1) push('info', '本文に <h1> があります（記事ではタイトル側が h1 になるのが一般的）', h.start, h.end);
      else if (prev === null && h.lv > 2) push('info', '最初の見出しが h' + h.lv + ' です（h2 始まりが一般的）', h.start, h.end);
      if (prev !== null && h.lv > prev + 1) push('warn', '見出しレベルが飛んでいます（h' + prev + ' → h' + h.lv + '）', h.start, h.end);
      prev = h.lv;
    }

    // 見出し直下に本文がない(見出しが連続)
    if (fmt === 'html') {
      const hhre = /<\/(h[1-6])>\s*<(h[1-6])\b/gi;
      while ((m = hhre.exec(v)) !== null) {
        push('info', '見出しの直下に本文がありません(' + m[1] + '→' + m[2] + ')', m.index, m.index + m[0].length);
      }
    }

    // ── 文章・表記ルール ──
    const tv = buildTextView(v, fmt);
    for (const r of TEXT_RULES) {
      if (r.profiles && !r.profiles.includes(pid)) continue;
      r.re.lastIndex = 0;
      let c;
      while ((c = r.re.exec(tv.text)) !== null && out.length < 300) {
        push(r.level, r.msg, tv.map[c.index], tv.map[c.index + c[0].length - 1] + 1);
        if (c[0].length === 0) r.re.lastIndex++;
      }
    }
    if (fmt === 'html') for (const r of HTML_RULES) {
      if (r.profiles && !r.profiles.includes(pid)) continue;
      r.re.lastIndex = 0;
      let c;
      while ((c = r.re.exec(v)) !== null && out.length < 300) {
        push(r.level, r.msg, c.index, c.index + c[0].length);
        if (c[0].length === 0) r.re.lastIndex++;
      }
    }

    // ── 文単位チェック(長文・語尾・文体混在) ──
    const sentences = [];
    {
      let s = 0;
      for (let i = 0; i < tv.text.length; i++) {
        const ch = tv.text[i];
        if (ch === '。' || ch === '！' || ch === '？' || ch === '\n') {
          const seg = tv.text.slice(s, i).trim();
          if (seg && ch !== '\n') sentences.push({ start: s, end: i + 1, seg });
          s = i + 1;
        }
      }
    }
    for (const st of sentences) {
      if (st.seg.length > 120) push('info', '一文が長すぎます(' + st.seg.length + '字)。分割を検討', tv.map[st.start], tv.map[st.end - 1] + 1);
    }
    const endOf = seg => { const mm = seg.match(/(でしょう|ましょう|ください|でした|ました|です|ます)$/); return mm ? mm[1] : null; };
    let run = 1;
    for (let i = 1; i < sentences.length; i++) {
      const a = endOf(sentences[i - 1].seg), b = endOf(sentences[i].seg);
      if (a && b && a === b) {
        run++;
        if (run === 3) push('info', '同じ語尾「' + b + '」が3文連続しています。リズムに変化を', tv.map[sentences[i].start], tv.map[sentences[i].end - 1] + 1);
      } else run = 1;
    }
    const desuCnt = sentences.filter(x => /(です|ます|でしょう|ました|でした|ません)$/.test(x.seg)).length;
    const daCnt = sentences.filter(x => /(である|だ|だった)$/.test(x.seg)).length;
    if (desuCnt >= 2 && daCnt >= 2) {
      push('info', '文体が混在しています(です・ます ' + desuCnt + '文 / だ・である ' + daCnt + '文)', 0, 1);
    }

    // ── HameeFun 固有チェック(HTMLモードのみ) ──
    if (fmt === 'html' && pid === 'hameefun') {
      const tableRanges = [];
      const tre = /<table\b[\s\S]*?<\/table>/gi;
      while ((m = tre.exec(v)) !== null) tableRanges.push([m.index, m.index + m[0].length]);
      const bre = /<br\s*\/?\s*>/gi;
      while ((m = bre.exec(v)) !== null) {
        const p = m.index;
        if (!tableRanges.some(r => p >= r[0] && p < r[1])) {
          push('warn', '[HameeFun] <br>改行は禁止(段落は<p>で分ける。表内のみOK)', p, p + m[0].length);
        }
      }
      const lre = /<li\b[^>]*>([\s\S]*?)<\/li>/gi;
      while ((m = lre.exec(v)) !== null) {
        const inner = m[1].replace(/<[^>]*>/g, '').trim();
        if (/(。|です|ます)$/.test(inner)) push('warn', '[HameeFun] リストは体言止め・句点なしに統一', m.index, m.index + m[0].length);
      }
      const pre = /<p\b[^>]*>([\s\S]*?)<\/p>/gi;
      while ((m = pre.exec(v)) !== null) {
        const innerText = m[1].replace(/<[^>]*>/g, '');
        const cnt = (innerText.match(/[。！？]/g) || []).length;
        if (cnt >= 2) push('info', '[HameeFun] 1文ごとに<p>で区切る(この段落は' + cnt + '文)', m.index, m.index + m[0].length);
        const lines = (m[1].match(/class="line"/g) || []).length;
        if (lines >= 3) push('info', '[HameeFun] span.lineの多用(1段落1箇所程度が目安)', m.index, m.index + m[0].length);
      }
      const hre = /<h[2-4][^>]*>[\s\S]*?<\/h[2-4]>/gi;
      while ((m = hre.exec(v)) !== null) {
        const openEnd = m[0].indexOf('>') + 1;
        const inner = m[0].slice(openEnd, m[0].lastIndexOf('<'));
        const amp = inner.match(/&(?!(amp|lt|gt|quot|#\w+);)/);
        if (amp) push('warn', '[HameeFun] 見出し内の「&」は「&amp;」に(本文が消えるバグの原因)', m.index + openEnd + amp.index, m.index + openEnd + amp.index + 1);
      }
      const sre = /<h2[^>]*>\s*まとめ\s*<\/h2>/gi;
      while ((m = sre.exec(v)) !== null) {
        push('info', '[HameeFun] 最後のh2は「まとめ」のみでなく内容に合った見出しに', m.index, m.index + m[0].length);
      }
      const excl = (tv.text.match(/！/g) || []).length;
      if (excl >= 5) push('info', '[HameeFun] 感嘆符「！」の多用に注意(' + excl + '箇所)', 0, 1);
      const ire = /<img\b[^>]*src\s*=\s*["']([^"']+)["'][^>]*>/gi;
      while ((m = ire.exec(v)) !== null) {
        const base = (m[1].split('/').pop() || '').split('?')[0];
        if (/_/.test(base)) push('info', '[HameeFun] 画像ファイル名は「-」推奨(「_」不可): ' + base.slice(0, 40), m.index, m.index + m[0].length);
      }
    }

    // ── SUUTA 固有チェック(HTMLモードのみ) ──
    if (fmt === 'html' && pid === 'suuta') {
      const pre = /<p\b[^>]*>([\s\S]*?)<\/p>/gi;
      while ((m = pre.exec(v)) !== null) {
        const cnt = ((m[1].replace(/<[^>]*>/g, '').match(/[。！？]/g)) || []).length;
        if (cnt >= 3) push('info', '[SUUTA] 一文ごとの改段落を推奨(この段落は' + cnt + '文)', m.index, m.index + m[0].length);
      }
      const hsre = /<h[23][^>]*>[\s\S]*?<(strong|b)\b[\s\S]*?<\/h[23]>/gi;
      while ((m = hsre.exec(v)) !== null) {
        push('warn', '[SUUTA] 見出し内に太字タグを入れない', m.index, Math.min(m.index + 30, m.index + m[0].length));
      }
    }

    out.sort((a, b) => a.start - b.start);
    return out;
  }

  function openLint() {
    const items = runLint();
    lintBody.textContent = '';
    const pname = (PROFILES.find(p => p.id === ((activeDoc() && activeDoc().profile) || 'all')) || PROFILES[0]).name;
    lintCountEl.textContent = '　' + pname + '基準' + (items.length ? ' / ' + items.length + '件' : '');
    if (!items.length) {
      const ok = document.createElement('div');
      ok.className = 'lint-ok';
      ok.textContent = '✓ 問題は見つかりませんでした';
      lintBody.appendChild(ok);
    } else {
      for (const it of items.slice(0, 100)) {
        const row = document.createElement('div');
        row.className = 'lint-item lint-' + it.level;
        row.setAttribute('data-jump', '1');
        const badge = document.createElement('span');
        badge.className = 'lint-badge';
        badge.textContent = it.level === 'warn' ? '注意' : '情報';
        const msg = document.createElement('span');
        msg.textContent = it.msg;
        row.append(badge, msg);
        row.addEventListener('click', () => { closeLint(); jumpTo(it.start, it.end); });
        lintBody.appendChild(row);
      }
      if (items.length > 100) {
        const more = document.createElement('div');
        more.className = 'ol-empty';
        more.textContent = '…ほか ' + (items.length - 100) + ' 件';
        lintBody.appendChild(more);
      }
    }
    lintEl.hidden = false;
  }
  function closeLint() { lintEl.hidden = true; }
  $('btnLint').addEventListener('click', openLint);
  $('btnCloseLint').addEventListener('click', closeLint);
  lintEl.addEventListener('click', e => { if (e.target === lintEl) closeLint(); });

  // ── 画像配置(プレースホルダ方式) ──
  // 写真は縮小版だけを端末内(IndexedDB)に保存し、本文には <!-- img:ID ラベル --> という
  // コメント行だけを挿入する。プレビューでその位置に実物サムネイルを表示し、
  // 「コピー」時にはコメントを自動除去するので納品HTMLは汚れない。
  const imgTrayEl = $('imgTray'), imgTrayInfo = $('imgTrayInfo'), imgInput = $('imgInput');
  const imgUrls = {};
  let imgDB = null;

  function idbOpen() {
    return new Promise((res, rej) => {
      const q = indexedDB.open('html-editor', 1);
      q.onupgradeneeded = () => { q.result.createObjectStore('images', { keyPath: 'id', autoIncrement: true }); };
      q.onsuccess = () => res(q.result);
      q.onerror = () => rej(q.error);
    });
  }
  async function idbAll() {
    if (!imgDB) imgDB = await idbOpen();
    return new Promise((res, rej) => {
      const q = imgDB.transaction('images').objectStore('images').getAll();
      q.onsuccess = () => res(q.result || []);
      q.onerror = () => rej(q.error);
    });
  }
  async function idbPut(rec) {
    if (!imgDB) imgDB = await idbOpen();
    return new Promise((res, rej) => {
      const q = imgDB.transaction('images', 'readwrite').objectStore('images').add(rec);
      q.onsuccess = () => res(q.result);
      q.onerror = () => rej(q.error);
    });
  }
  async function idbDel(id) {
    if (!imgDB) imgDB = await idbOpen();
    return new Promise((res, rej) => {
      const q = imgDB.transaction('images', 'readwrite').objectStore('images').delete(id);
      q.onsuccess = () => res();
      q.onerror = () => rej(q.error);
    });
  }

  // createImageBitmap優先+img要素フォールバック(非表示タブでのdecode問題対策)
  function fileToBitmap(f) {
    return createImageBitmap(f).catch(() => new Promise((res, rej) => {
      const u = URL.createObjectURL(f);
      const im = new Image();
      im.onload = () => { URL.revokeObjectURL(u); res(im); };
      im.onerror = rej;
      im.src = u;
    }));
  }

  async function importImages(files) {
    let n = 0;
    for (const f of files) {
      try {
        const bmp = await fileToBitmap(f);
        const w0 = bmp.width || bmp.naturalWidth, h0 = bmp.height || bmp.naturalHeight;
        const sc = Math.min(1, 800 / w0);
        const w = Math.max(1, Math.round(w0 * sc)), h = Math.max(1, Math.round(h0 * sc));
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(bmp, 0, 0, w, h);
        const blob = await new Promise(r => cv.toBlob(r, 'image/jpeg', 0.8));
        if (!blob) continue;
        const label = (f.name || 'photo').replace(/\.[^.]+$/, '');
        const id = await idbPut({ label, size: blob.size, blob, created: Date.now() });
        imgUrls[id] = URL.createObjectURL(blob);
        n++;
      } catch (_) {}
    }
    await renderTray();
    flash(n + '枚読み込みました(縮小版を端末内に保存)');
  }

  async function renderTray() {
    let recs = [];
    try { recs = await idbAll(); } catch (_) { imgTrayInfo.textContent = '画像DBを開けません'; return; }
    imgTrayEl.querySelectorAll('.imx').forEach(el => el.remove());
    let bytes = 0;
    for (const rec of recs) {
      bytes += rec.size || 0;
      if (!imgUrls[rec.id]) imgUrls[rec.id] = URL.createObjectURL(rec.blob);
      const box = document.createElement('div');
      box.className = 'imx';
      box.title = rec.label + '(タップで挿入)';
      const im = document.createElement('img');
      im.src = imgUrls[rec.id];
      im.alt = rec.label;
      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'del';
      del.textContent = '×';
      del.setAttribute('aria-label', rec.label + ' を削除');
      del.addEventListener('click', async e => {
        e.stopPropagation();
        if (!del.classList.contains('armed')) {
          del.classList.add('armed');
          setTimeout(() => del.classList.remove('armed'), 2000);
          return;
        }
        await idbDel(rec.id);
        if (imgUrls[rec.id]) { URL.revokeObjectURL(imgUrls[rec.id]); delete imgUrls[rec.id]; }
        renderTray();
        if (app.classList.contains('preview')) updatePreview();
      });
      box.append(im, del);
      box.addEventListener('click', () => {
        const ph = '\n<!-- img:' + rec.id + ' ' + rec.label + ' -->\n';
        insert(ph, ph.length, ph.length);
        flash('画像メモを挿入しました(コピー時は自動除去)');
      });
      imgTrayEl.appendChild(box);
    }
    imgTrayInfo.textContent = recs.length
      ? recs.length + '枚 / 約' + (bytes / 1024 / 1024).toFixed(1) + 'MB'
      : '「＋写真」で読み込むとここに並びます';
  }

  // プレビュー用: 画像メモをサムネイル付きの枠に置き換える
  function resolvePlaceholders(src) {
    return src.replace(/<!--\s*img:(\d+)\s*([\s\S]*?)-->/g, (mm, id, label) => {
      const u = imgUrls[id];
      const cap = escHtml((label || '').trim() || ('画像 ' + id));
      const body = u ? '<img src="' + u + '" alt="">' : '<div class="ph-missing">(この端末に写真データがありません)</div>';
      return '<figure class="ph">' + body + '<figcaption>📷 配置予定: ' + cap + '</figcaption></figure>';
    });
  }

  $('btnAddImg').addEventListener('click', () => imgInput.click());
  imgInput.addEventListener('change', () => {
    if (imgInput.files.length) importImages([...imgInput.files]);
    imgInput.value = '';
  });
  // トレイのタップでエディタのキーボードが閉じないようにする
  imgTrayEl.addEventListener('mousedown', e => { if (e.target.closest('.imx')) e.preventDefault(); });

  // ── ハードウェアキーボード（Magic Keyboard等）──
  const byLabel = l => TAG_BUTTONS.find(b => b.label === l);
  editor.addEventListener('keydown', e => {
    if (e.key === 'Tab' && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      insert('  ', 2, 2);
      return;
    }
    if (!(e.metaKey || e.ctrlKey)) return;
    const k = e.key.toLowerCase();
    if (k === 's')      { e.preventDefault(); $('btnSave').click(); }
    else if (k === 'b') { e.preventDefault(); applyTag(byLabel('strong')); }
    else if (k === 'i') { e.preventDefault(); applyTag(byLabel('em')); }
    else if (k === 'k') { e.preventDefault(); applyTag(byLabel('a')); }
  });
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'f') {
      e.preventDefault();
      openSearch();
      return;
    }
    if (e.key === 'Escape') {
      if (!lintEl.hidden) closeLint();
      else if (!outlineEl.hidden) closeOutline();
      else if (app.classList.contains('search')) closeSearch();
      else if (app.classList.contains('preview')) btnPreview.click();
    }
  });

  // ── 起動時：前回の内容を復元 ──
  (function init() {
    let data = null;
    try { data = JSON.parse(localStorage.getItem(KEY) || 'null'); } catch (_) {}
    if (!data) {
      // 旧バージョン（1ファイル形式）の下書きを引き継ぐ
      let v1 = null;
      try { v1 = JSON.parse(localStorage.getItem(KEY_V1) || 'null'); } catch (_) {}
      if (v1 && v1.content) {
        data = { v: 2, active: 0, docs: [{ name: v1.name || 'article.html', content: v1.content }] };
        try { localStorage.removeItem(KEY_V1); } catch (_) {}
      }
    }
    if (data && Array.isArray(data.docs) && data.docs.length) {
      for (const d of data.docs) addDoc(d.name || 'article.html', d.content || '', false, d.profile, d.format);
      const idx = Math.min(Math.max(data.active | 0, 0), docs.length - 1);
      switchTo(docs[idx].id);
      flash('前回の内容を復元しました');
    } else {
      addDoc('article.html', SAMPLE);
    }
    updateCount();
    renderTray().catch(() => {});
  })();
</script>
<script>
if ('serviceWorker' in navigator) {
  addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
}
</script>
